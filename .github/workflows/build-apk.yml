# GitHub Actions 工作流：自动构建 Android APK
name: Build Android APK

on:
  # 当代码推送到 main 分支时自动构建
  push:
    branches: [main, master]
  # 手动触发构建
  workflow_dispatch:
  # 打标签时构建
  release:
    types: [published]

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      # 3. 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 5. 构建 Web 应用
      - name: Build Web App
        run: pnpm build

      # 6. 添加 Capacitor 平台
      - name: Add Android platform
        run: pnpm cap add android

      # 7. 同步 Capacitor
      - name: Sync Capacitor
        run: pnpm cap sync android

      # 8. 设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      # 9. 构建 APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 10. 上传 APK 作为构建产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hailin-assistant-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 11. 如果是发布版本，创建 GitHub Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 通知构建结果（可选）
  notify:
    name: Notify
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - name: Show result
        run: |
          echo "APK构建完成！"
          echo "下载链接将在 Actions 页面可见"

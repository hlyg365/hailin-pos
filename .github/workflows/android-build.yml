name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      update_message:
        description: '更新说明'
        required: false
        default: '版本更新'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
          gradle-wrapper-file: android/gradle/wrapper/gradle-wrapper.properties

      - name: Get Gradle wrapper
        run: |
          cd android
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            wget -q https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar \
              -O gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Build Web App
        run: pnpm build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy native plugins
        run: |
          # Copy Java plugin files
          cp -f src/main/java/com/hailin/pos/ScalePlugin.java android/app/src/main/java/com/hailin/pos/ 2>/dev/null || true
          cp -f src/main/java/com/hailin/pos/PrinterPlugin.java android/app/src/main/java/com/hailin/pos/ 2>/dev/null || true
          cp -f src/main/java/com/hailin/pos/DualScreenPlugin.java android/app/src/main/java/com/hailin/pos/ 2>/dev/null || true
          cp -f src/main/java/com/hailin/pos/CustomerDisplayActivity.java android/app/src/main/java/com/hailin/pos/ 2>/dev/null || true
          cp -f src/main/java/com/hailin/pos/UsbPermissionReceiver.java android/app/src/main/java/com/hailin/pos/ 2>/dev/null || true
          cp -f src/main/java/com/hailin/pos/UsbDeviceService.java android/app/src/main/java/com/hailin/pos/ 2>/dev/null || true
          cp -f src/main/java/com/hailin/pos/MainActivity.java android/app/src/main/java/com/hailin/pos/ 2>/dev/null || true
          
          # Update AndroidManifest
          cp -f android/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml.bak 2>/dev/null || true

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode=all 2>&1 | tail -50
        continue-on-error: true

      - name: Build Release APK
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -50
        continue-on-error: true

      - name: List APK files
        run: |
          echo "=== Debug APK ==="
          find android -name "*.apk" -type f 2>/dev/null
          ls -lh android/app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "No debug APK"
          echo ""
          echo "=== Release APK ==="
          ls -lh android/app/build/outputs/apk/release/*.apk 2>/dev/null || echo "No release APK"

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release APK
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          
          if [ -f "$APK_PATH" ]; then
            # Get changelog from commit messages
            CHANGELOG=$(git log --oneline -10 --format="• %s")
            
            # Create GitHub Release
            gh release create "v$VERSION" \
              --title "海邻收银台 v$VERSION" \
              --body "## 更新说明

$CHANGELOG

## 下载 APK
- [点击下载 APK](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

## 构建信息
- 构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
- 构建编号: ${{ github.run_id }}" \
              --draft=false
            
            # Upload APK to release
            gh release upload "v$VERSION" "$APK_PATH" --clobber
            
            echo "✅ Release v$VERSION created successfully"
          else
            echo "⚠️ Release APK not found at $APK_PATH"
          fi

      - name: Generate Version Info JSON
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        run: |
          VERSION_NAME=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION_NAME" == *"refs/heads"* ]]; then
            VERSION_NAME="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          
          # Get version code from android/app/build.gradle
          VERSION_CODE=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle 2>/dev/null || echo "1")
          
          cat > version-info.json << EOF
          {
            "version": "$VERSION_NAME",
            "versionCode": $VERSION_CODE,
            "buildId": "${{ github.run_id }}",
            "buildTime": "$(date -u '+%Y-%m-%dT%H:%M:%SZ')",
            "downloadUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "releaseNotes": "$(git log --oneline -5 --format='%s' | tr '\n' ' ')"
          }
          EOF
          
          echo "=== Version Info ==="
          cat version-info.json

      - name: Upload Version Info
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: version-info.json
          retention-days: 30

      - name: Deploy to Update Server
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          if [ -n "$DEPLOY_URL" ] && [ -n "$DEPLOY_TOKEN" ]; then
            VERSION_NAME=${GITHUB_REF#refs/tags/v}
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
            
            if [ -f "$APK_PATH" ]; then
              # Upload APK to server
              curl -X POST "$DEPLOY_URL/api/upload" \
                -H "Authorization: Bearer $DEPLOY_TOKEN" \
                -F "file=@$APK_PATH" \
                -F "version=$VERSION_NAME" \
                -F "buildId=${{ github.run_id }}"
              
              echo "✅ APK deployed to update server"
            fi
          else
            echo "⚠️ Deploy not configured, skipping"
          fi

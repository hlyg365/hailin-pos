<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - 海邻收银台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #FF6B35 0%, #f97316 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 24px;
    }
    button {
      background: white;
      color: #FF6B35;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    .tips {
      margin-top: 32px;
      padding: 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📵</div>
    <h1>网络已断开</h1>
    <p>请检查网络连接后重试</p>
    <button onclick="location.reload()">重新连接</button>
    <div class="tips">
      <p>💡 离线提示</p>
      <p>您已缓存的商品数据仍可使用</p>
      <p>订单将在网络恢复后自动同步</p>
    </div>
  </div>
</body>
</html>

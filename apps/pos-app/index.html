<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4a90d9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="收银台" />
    <meta name="description" content="海邻到家 AI 智慧收银系统" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>海邻到家 - 智能便利店管理系统</title>
    <!-- 加载HailinHardware原生插件桥接（必须在主脚本之前） -->
    <script src="/cordova.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 注册 Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[App] SW registered:', reg.scope))
            .catch((err) => console.log('[App] SW registration failed:', err));
        });
      }
      
      // WebView桥接：接收原生通过evaluateJavascript发送的数据
      // 这是备用方案，确保秤数据能到达前端
      window.HailinHardwareBridge = function(eventName, data) {
        console.log('[WebView桥接] 收到事件:', eventName, data);
        
        if (eventName === 'scaleData') {
          // 转发到硬件服务的事件系统
          if (window.__hardwareEventBus) {
            window.__hardwareEventBus.emit('scaleData', data);
            window.__hardwareEventBus.emit('weightChanged', data);
          }
        } else if (eventName === 'barcodeScanned') {
          if (window.__hardwareEventBus) {
            window.__hardwareEventBus.emit('barcodeScanned', data);
            window.__hardwareEventBus.emit('scan', data);
          }
        }
      };
      
      // 事件总线（供WebView桥接使用）
      window.__hardwareEventBus = {
        listeners: {},
        on: function(event, callback) {
          if (!this.listeners[event]) this.listeners[event] = [];
          this.listeners[event].push(callback);
        },
        off: function(event, callback) {
          if (!this.listeners[event]) return;
          this.listeners[event] = this.listeners[event].filter(cb => cb !== callback);
        },
        emit: function(event, data) {
          if (!this.listeners[event]) return;
          this.listeners[event].forEach(cb => {
            try { cb(data); } catch(e) { console.error('[事件总线] 回调异常:', e); }
          });
        }
      };
      
      console.log('[App] WebView桥接已初始化');
    </script>
  </body>
</html>

name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/pos-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/pos-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: apps/pos-app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'apps/pos-app/pnpm-lock.yaml'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: cd apps/pos-app && pnpm install

      - name: Build Web App
        run: cd apps/pos-app && pnpm build

      - name: Sync to Android
        run: cd apps/pos-app && pnpm exec cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Change gradlew permission
        run: chmod +x apps/pos-app/android/gradlew

      - name: Build Debug APK
        run: |
          cd apps/pos-app/android
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hailin-pos-apk
          path: apps/pos-app/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: apps/pos-app/android/app/build/outputs/apk/debug/*.apk
          name: "海邻到家收银台 APK"
          tag_name: v${{ github.run_number }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

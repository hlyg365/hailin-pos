name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: apps/pos-app
        run: pnpm install --prefer-offline
        timeout-minutes: 10

      - name: Build Web App
        working-directory: apps/pos-app
        run: pnpm build

      - name: Sync to Android
        working-directory: apps/pos-app
        run: pnpm exec cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Change gradlew permission
        working-directory: apps/pos-app
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: apps/pos-app
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hailin-pos-apk
          path: apps/pos-app/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/pos-app/android/app/build/outputs/apk/debug/*.apk
          name: "海邻到家收银台 APK v${{ github.run_number }}"
          tag_name: v${{ github.run_number }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
